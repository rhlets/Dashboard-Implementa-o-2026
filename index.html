  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

c-4d4f-b837-6b12aeeb2951\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n\n:root{\n  /* Surfaces & borders — Max cosmos gray scale */\n  --bg:#F6F9FC;--surface:#FFF;--surface2:#F6F9FC;--border:#DBE4ED;\n  /* Text — Dark Matter → Comet */\n  --t1:#192733;--t2:#3E5974;--t3:#516F90;--t4:#7691AD;\n  /* Brand — Max red / Solaris orange */\n  --orange:#F93846;--orange2:#FF5C35;--orange-bg:#FFF1F1;--orange-ring:#FFBCBD;\n  /* Status — Fresh Leaf green / Brezel yellow */\n  --green:#45893D;--green-bg:#ECF3EC;--green-ring:#AED7AC;\n  --amber:#B25A0E;--amber-bg:#FEF6E1;--amber-ring:#FFD189;\n  /* Accents — Pier 39 blue / Kreuzberg purple */\n  --blue:#2F75A0;--purple:#545AD4;--pink:#C026D3;--teal:#2F75A0;\n  --r:12px;--sh:0 1px 2px rgba(25,39,51,.04);\n  --font:'Inter',ui-sans-serif,system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;\n}\n*{box-sizing:border-box;margin:0;padding:0}\nhtml,body{width:100%;min-height:100vh}\nbody{font-family:var(--font);background:var(--bg);color:var(--t1);min-height:100vh}\n::-webkit-scrollbar{width:5px;height:5px}\n::-webkit-scrollbar-track{background:var(--bg)}\n::-webkit-scrollbar-thumb{background:#DBE4ED;border-radius:99px}\n::-webkit-scrollbar-thumb:hover{background:#B6C7D6}\ninput[type=date]::-webkit-calendar-picker-indicator{opacity:.35;cursor:pointer}\ninput[type=number]::-webkit-inner-spin-button{opacity:.4}\nselect option{background:#FFF}\nbutton{font-family:var(--font);cursor:pointer;transition:filter .12s}\nbutton:hover{filter:brightness(.93)}\n\n/* HEADER */\n.header{background:#FFF;border-bottom:1px solid var(--border);padding:14px 32px;display:flex;align-items:center;gap:18px;position:sticky;top:0;z-index:10;box-shadow:0 1px 8px rgba(20,50,80,.07);width:100%}\n.logo-mark{width:36px;height:36px;border-radius:9px;background:linear-gradient(140deg,#F93846,#FF5C35);display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 2px 8px rgba(249,56,70,.28)}\n.logo-wordmark{display:flex;flex-direction:column;gap:1px}\n.logo-top{font-size:16px;font-weight:800;line-height:1;letter-spacing:-.4px;color:var(--t1)}\n.logo-top span.org{color:var(--orange2)}\n.logo-top span.div{color:var(--t4);font-weight:400;font-size:13px;margin-left:5px}\n.logo-sub{font-size:9px;color:var(--t4);letter-spacing:.1em;font-weight:600}\n.hdivider{width:1px;height:34px;background:var(--border);flex-shrink:0}\n.h-stats{display:flex;gap:22px;flex:1;flex-wrap:wrap}\n.h-stat{display:flex;align-items:baseline;gap:5px}\n.h-stat-n{font-size:19px;font-weight:800;line-height:1}\n.h-stat-l{font-size:11px;color:var(--t4);line-height:1.2}\n.h-right{display:flex;align-items:center;gap:10px;flex-shrink:0}\n.h-pct{text-align:right}\n.h-pct-label{font-size:9px;color:var(--t4);font-weight:700;letter-spacing:.08em}\n.h-pct-num{font-size:20px;font-weight:800;color:var(--orange);line-height:1}\n\n/* NAV */\n.nav{background:#FFF;border-bottom:1px solid var(--border);padding:0 32px;display:flex;position:sticky;top:65px;z-index:9;width:100%}\n.tab-btn{padding:11px 17px;background:none;border:none;border-bottom:2px solid transparent;color:var(--t3);font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;white-space:nowrap}\n.tab-btn:hover{color:var(--t2)}\n.tab-btn.active{color:var(--orange);border-bottom-color:var(--orange)}\n\n/* CONTENT */\n.content{padding:24px 32px;width:100%}\n\n/* CARD */\n.card{background:#FFF;border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--sh)}\n\n/* CHIP */\n.chip{display:inline-flex;align-items:center;font-size:11px;font-weight:600;border-radius:20px;padding:3px 10px;line-height:1;white-space:nowrap;border:1px solid}\n\n/* PROGRESS BAR */\n.pbar-wrap{background:#EAF0F6;border-radius:99px;overflow:hidden}\n.pbar-fill{border-radius:99px;transition:width .4s}\n\n/* STAT CARD */\n.stat-card{padding:20px 22px;border-top:3px solid}\n\n/* GRID */\n.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}\n.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}\n.grid-1-2{display:grid;grid-template-columns:1fr 2fr;gap:16px}\n.grid-auto{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:8px}\n\n/* TASK ROWS */\n.task-row{border-bottom:1px solid #EAF0F6;transition:background .2s}\n.task-row.is-done{background:#F7F9F7}\n.task-content{display:flex;align-items:center;gap:10px;padding:12px 18px;flex-wrap:wrap}\n.task-desc-box{display:none;padding:0 18px 14px 52px}\n.task-desc-box.open{display:block}\n\n/* ACCORDIONS */\n.acc-header{display:flex;align-items:center;gap:12px;padding:13px 18px;cursor:pointer;background:#FFF;border-bottom:1px solid transparent;user-select:none}\n.acc-header.open{background:#F6F9FC;border-bottom-color:#EAF0F6}\n.acc-arrow{transition:transform .2s;font-size:14px;color:var(--t4);line-height:1;margin-left:2px}\n.acc-header.open .acc-arrow{transform:rotate(90deg)}\n.acc-body{display:none}\n.acc-body.open{display:block}\n\n/* FORMS */\n.filter-row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:14px}\n.finput{background:#FFF;border:1px solid var(--border);border-radius:8px;color:var(--t2);font-size:12px;padding:8px 12px;font-family:var(--font);outline:none}\n.finput:focus{border-color:var(--orange)}\n.date-input{background:var(--surface2);border:1px solid var(--border);border-radius:8px;font-size:11px;padding:4px 9px;font-family:var(--font);cursor:pointer;outline:none;color:var(--t4)}\n.date-input.has-date{color:#BD0E21;border-color:#FEA081}\n.status-btn{display:inline-flex;align-items:center;gap:5px;padding:4px 11px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;font-family:var(--font);white-space:nowrap;line-height:1;border:1px solid}\n\n/* KPI STYLES */\n.kpi-row{display:flex;align-items:center;gap:12px;padding:12px 20px;border-bottom:1px solid #EAF0F6;flex-wrap:wrap;transition:background .2s}\n.kpi-row.kpi-ok{background:#F7F9F7}\n.kpi-text{flex:1;min-width:200px;font-size:13px;color:var(--t2);line-height:1.4}\n.kpi-text.done-text{color:var(--t4);text-decoration:line-through}\n.kpi-num-wrap{display:flex;align-items:center;gap:8px;flex-shrink:0}\n.kpi-input{width:64px;padding:5px 8px;border:1px solid var(--border);border-radius:8px;font-size:13px;font-weight:700;font-family:var(--font);text-align:center;color:var(--t1);background:#FFF;outline:none}\n.kpi-input:focus{border-color:var(--orange)}\n.kpi-meta{font-size:11px;color:var(--t4);white-space:nowrap}\n.kpi-bar-wrap{width:70px}\n.kpi-toggle{padding:4px 12px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;font-family:var(--font);white-space:nowrap;line-height:1.2;border:1px solid}\n.kpi-toggle.achieved{color:#396731;background:#ECF3EC;border-color:#AED7AC}\n.kpi-toggle.pending{color:var(--amber);background:var(--amber-bg);border-color:var(--amber-ring)}\n.kpi-status-chip{font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;border:1px solid;white-space:nowrap}\n\n/* DETAIL SECTIONS */\n.detail-section{margin-bottom:20px}\n.detail-section-title{font-size:11px;font-weight:700;color:var(--t4);letter-spacing:.06em;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:6px}\n.info-box{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:14px 16px}\n.info-box-title{font-size:11px;font-weight:700;color:var(--t4);letter-spacing:.06em;text-transform:uppercase;margin-bottom:8px}\n.bullet-li{display:flex;align-items:flex-start;gap:8px;font-size:12px;color:var(--t2);line-height:1.5;margin-bottom:5px}\n.bullet-dot{font-size:9px;margin-top:4px;flex-shrink:0}\n.kpi-card-d{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;display:flex;align-items:flex-start;gap:8px;font-size:12px;color:var(--t2);line-height:1.4}\n.goal-item{display:flex;align-items:flex :'Novembro',ws:22,we:24,desc:'Fluxo: Gestor → RH → Liderança → Jurídico → Financeiro.',bullets:['Mapeamento do processo atual','Fluxo formal com todos os aprovadores','Formulário padronizado','Comunicação do fluxo']}\n    ]},\n    {id:'P09',num:'09',name:'Clima e Comunicação Interna',responsible:'Gestor(a) de RH',\n     participants:['Liderança Executiva','Gestores de Tecnologia e CS','Colaboradores','Equipe de Marketing/Comunicação'],\n     marcos:['Pesquisa de Clima realizada','Plano de Ação em andamento','Comunicação interna fortalecida'],\n     kpis:[{id:'P09-k0',text:'% de participação na pesquisa de clima',type:'percent',target:80},{id:'P09-k1',text:'Plano de ação de clima elaborado e comunicado',type:'binary'},{id:'P09-k2',text:'% de ações do plano de clima iniciadas',type:'percent',target:null},{id:'P09-k3',text:'Feedback positivo sobre a transparência dos resultados',type:'binary'},{id:'P09-k4',text:'Ferramenta de IA para análise de sentimento em teste',type:'binary'}],\n     goals:['Pesquisa de clima com 80% de participação','Elaborar e comunicar plano de ação','Lançar newsletter interna','Iniciar IA na comunicação interna'],\n     items:[\n      {id:'9.1',name:'Pesquisa de Clima Organizacional',wr:'Sem. 22–24',period:'Novembro',ws:22,we:24,desc:'Ferramenta, perguntas sobre engajamento/liderança, coleta e análise.',bullets:['Ferramenta para pesquisa de clima (SurveyMonkey, Typeform)','Perguntas sobre engajamento, liderança, cultura, ambiente e benefícios','Coleta de dados e análise de resultados','Elaboração de relatório']},\n      {id:'9.2',name:'Plano de Ação Pós-Pesquisa de Clima',wr:'Sem. 24–25',period:'Novembro',ws:24,we:25,desc:'Apresentação de resultados, plano de ação, grupos de trabalho.',bullets:['Apresentação transparente à liderança e colaboradores','Plano de ação para pontos de melhoria','Grupos de trabalho para implementar as ações']},\n      {id:'9.3',name:'Fortalecimento da Comunicação Interna',wr:'Sem. 23–25',period:'Novembro',ws:23,we:25,desc:'Calendário editorial, Newsletter, IA para análise de sentimento.',bullets:['Avaliação dos canais de comunicação existentes','Calendário editorial interno','Newsletter Interna ou canal de notícias','IA para análise de sentimento no Slack']}\n    ]}\n  ]},\n  {id:'T1.2',label:'T1.2',color:'#2F75A0',name:'Otimização, Inovação e Sustentabilidade',period:'Dezembro 2026',phases:[\n    {id:'P10',num:'10',name:'Otimização de Processos e IA',responsible:'Gestor(a) de RH',\n     participants:['Equipe de TI','Gestores de Tecnologia e CS','Liderança Executiva'],\n     marcos:['Processos otimizados e automatizados','IA em R&S implementada','Centralização aprimorada com IA'],\n     kpis:[{id:'P10-k0',text:'% de processos de RH com automação implementada',type:'percent',target:30},{id:'P10-k1',text:'Ferramenta de IA para R&S em uso',type:'binary'},{id:'P10-k2',text:'Funcionalidades avançadas de IA no repositório ativas',type:'binary'},{id:'P10-k3',text:'Redução do tempo médio de triagem de currículos',type:'binary'},{id:'P10-k4',text:'Feedback positivo do RH sobre eficiência das automações',type:'binary'}],\n     goals:['Automatizar 30% dos processos de RH','Implementar IA em R&S','Aprimorar centralização com IA'],\n     items:[\n      {id:'10.1',name:'Otimização e Automação de Processos de RH',wr:'Sem. 26–27',period:'Dezembro',ws:26,we:27,desc:'Revisão de processos, gargalos, automações.',bullets:['Revisão de todos os processos implementados','Identificação de gargalos e oportunidades de automação','Automações: e-mails, workflows, integrações entre sistemas']},\n      {id:'10.2',name:'Integração de IA em Recrutamento e Seleção',wr:'Sem. 26–27',period:'Dezembro',ws:26,we:27,desc:'Triagem por IA, análise de perfis, chatbots.',bullets:['IA para triagem de currículos','Análise de perfil de candidatos','Chatbots para candidatos e FAQ','Treinamento do RH']},\n      {id:'10.3',name:'Centralização de Informações com IA Avançada',wr:'Sem. 26–28',period:'Dezembro',ws:26,we:28,desc:'B Revisão dos resultados, objetivos, metas, orçamento.',bullets:['Revisão dos resultados do ano','Objetivos e metas para o próximo ciclo','Orçamento de RH para o próximo ano']},\n      {id:'12.2',name:'Dashboard de Indicadores de RH (KPIs)',wr:'Sem. 28',period:'Dezembro',ws:28,we:28,desc:'Dashboard completo no HRIS/Power BI, apresentação à liderança.',bullets:['Dashboard completo de KPIs (HRIS, Power BI ou outra ferramenta)','Apresentação regular dos resultados à liderança']},\n      {id:'12.3',name:'Base de Gestão de Pessoas (Cloud) Completa',wr:'Sem. 28',period:'Dezembro',ws:28,we:28,desc:'HRIS totalmente funcional, dados migrados, IA otimizada.',bullets:['HRIS totalmente funcional','100% dos dados migrados e processos integrados','Documentação completa de todos os processos']}\n    ]}\n  ]}\n];\n\n\n// STATUS CONFIG\nconst ST_CFG={\n  pending:    {label:'Pendente',    color:'#B25A0E',bg:'#FEF6E1',ring:'#FFD189',dot:'#EF7F0A'},\n  in_progress:{label:'Em Andamento',color:'#BC3B10',bg:'#FDE1D8',ring:'#FEA081',dot:'#FF5C35'},\n  done:       {label:'Concluído',   color:'#396731',bg:'#ECF3EC',ring:'#AED7AC',dot:'#45893D'}\n};\nconst ST_ORDER=['pending','in_progress','done'];\nconst STORAGE_KEY='lets-rh-2026';\nconst KPI_KEY='lets-rh-2026-kpis';\nlet API_URL='https://script.google.com/macros/s/AKfycbylMzdEqgWtvdXLOzhDrLElJMc3LV4V6mtLI6-I5Rh-RgEt592oghVnqo_RpNBDulp0/exec';\n\n// STATE\nconst S={\n  tab:'dashboard',\n  taskSts:{},kpiVals:{},\n  openPhases:{},openDetails:{},openTasks:{},\n  filters:{q:'all',st:'all',search:'',detailQ:'all',kpiQ:'all'},\n  editMode:false,\n  editKey:sessionStorage.getItem('lets-edit-key')||'',\n  saving:false\n};\nif(S.editKey)S.editMode=true;\n\n// ─── JSONP (contorna CORS do Google Apps Script) ─────────\nfunction jsonp(url){\n  return new Promise((resolve,reject)=>{\n    const cb='_gs_'+Date.now();\n    const s=document.createElement('script');\n    const t=setTimeout(()=>{cleanup();reject(new Error('Timeout'));},12000);\n    function cleanup(){clearTimeout(t);delete window[cb];s.parentNode&&s.parentNode.removeChild(s);}\n    window[cb]=d=>{cleanup();resolve(d);};\n    s.onerror=()=>{cleanup();reject(new Error('Script error'));};\n    s.src=url+(url.includes('?')?'&':'?')+'callback='+cb;\n    document.head.appendChild(s);\n  });\n}\n\n// ─── STORAGE / API ───────────────────────────────\nasync function loadData(){\n  if(!API_URL){loadLocal();render();return;}\n  try{\n    const d=await jsonp(API_URL+'?action=load');\n    if(d.ok){S.taskSts=d.tasks||{};S.kpiVals=d.kpis||{};}\n  }catch(e){console.warn('API indisponível, usando local.',e);loadLocal();}\n  render();\n}\nfunction loadLocal(){\n  try{const v=localStorage.getItem(STORAGE_KEY);if(v)S.taskSts=JSON.parse(v);}catch{}\n  try{const v=localStorage.getItem(KPI_KEY);if(v)S.kpiVals=JSON.parse(v);}catch{}\n}\nasync function apiCall(params){\n  if(API_URL){\n    try{\n      S.saving=true;const si=document.getElementById('save-indicator');if(si)si.style.display='inline-flex';\n      const d=await jsonp(API_URL+'?'+new URLSearchParams({...params,password:S.editKey}).toString());\n      S.saving=false;if(si)si.style.display='none';\n      if(d&&d.error==='unauthorized'){S.editMode=false;S.editKey='';sessionStorage.removeItem('lets-edit-key');document.body.classList.add('locked');alert('Sessão expirada. Faça login novamente.');render();return false;}\n      return d&&d.ok;\n    }catch(e){S.saving=false;console.warn('Falha ao salvar.',e);}\n  }\n  try{localStorage.setItem(STORAGE_KEY,JSON.stringify(S.taskSts));}catch{}\n  try{localStorage.setItem(KPI_KEY,JSON.stringify(S.kpiVals));}catch{}\n  return true;\n}\n\nfunction getSt(id){return S.taskSts[id]?.status||'pending';}\nfunction getDate(id){return S.taskSts[id]?.completedAt||'';}\nfunction allItems(){return QUARTERS.flatMap(q=>q.phases.flatMap(p=>p.items));}\nfunction allKpis(){return QUARTERS.flatMap(q=>q.phases.flatMap(p=>p.kpis));}\nfunction getKpiVal(id){return S.kpiVals[id]?.value??0;}\nfunction getKpiAchieved(id){return S.kpiVals[id]?.achieved??false;}\nfunction isKpiOk(kpi){\n  if(kpi.type==='binary')return getKpiAchieved(kpi.id);\n  const v=getKpiVal(kpi.id);\n  return kpi.target?v>=kpi.target:v>0;\n}\nasync function cycleStatus(id){\n  if(!S.editMode){showModal();return;}\n  const cur=getSt(id),nxt=ST_ORDER[(ST_ORDER.indexOf(cur)+1)%ST_ORDER.length];\n  const completedAt=nxt==='done'?new Date().toISOString().split('T')[0]:nxt==='pending'?null:getDate(id);\n  S.taskSts[id]={status:nxt,completedAt};\n  await apiCall({action:'updateTask',id,status:nxt,completedAt:completedAt||''});\n}\nasync function setDateFn(id,val){\n  if(!S.editMode)return;\n  S.taskSts[id]={...(S.taskSts[id]||{status:'pending'}),completedAt:val};\n  await apiCall({action:'updateTask',id,status:getSt(id),completedAt:val});\n}\n\n// HELPERS\nconst esc=s=>String(s).replace(/&/g,'&amp;').replace(/<\u002Fg,'&lt;').replace(/>/g,'&gt;').replace(/\"/g,'&quot;');\nfunction chip(label,color,bg,border){border=border||color+'40';bg=bg||color+'15';return`<span class=\"chip\" style=\"color:${color};background:${bg};border-color:${border}\">${esc(label)}<\u002Fspan>`;}\nfunction pbar(pct,color,h=6,bg='#EAF0F6'){return`<div class=\"pbar-wrap\" style=\"height:${h}px;background:${bg}\"><div class=\"pbar-fill\" style=\"height:${h}px;width:${Math.min(pct,100)}%;background:${color}\"><\u002Fdiv><\u002Fdiv>`;}\nfunction statusBtn(id,status){const s=ST_CFG[status];return`<button class=\"status-btn\" data-action=\"cycle\" data-id=\"${id}\" style=\"color:${s.color};background:${s.bg};border-color:${s.ring}\"><span style=\"width:6px;height:6px;border-radius:50%;background:${s.dot};display:inline-block;flex-shrink:0\"><\u002Fspan>&nbsp;${s.label}<\u002Fbutton>`;}\n\n// ──────── HEADER ────────\nfunction renderHeader(){\n  const all=allItems(),done=all.filter(i=>getSt(i.id)==='done').length,ip=all.filter(i=>getSt(i.id)==='in_progress').length;\n  const pct=Math.round(done/all.length*100);\n  const ka=allKpis(),kDone=ka.filter(k=>isKpiOk(k)).length;\n  const lockBtn=S.editMode\n    ?`<button class=\"lock-btn unlocked\" data-action=\"lock\">✏️ Editando<\u002Fbutton>`\n    :`<button class=\"lock-btn locked\" data-action=\"unlock\">🔒 Modo Leitura<\u002Fbutton>`;\n  const dot=API_URL?`<span style=\"font-size:10px;color:#45893D;font-weight:600\">● Google Sheets<\u002Fspan>`:`<span style=\"font-size:10px;color:#EF7F0A;font-weight:600\">● Local<\u002Fspan>`;\n  return`<header class=\"header\">\n    <div class=\"flex items-center gap-12\">\n      <div class=\"logo-mark\"><svg width=\"18\" height=\"18\" viewBox=\"0 0 18 18\" fill=\"none\"><path d=\"M3.5 2.5H7V14H14.5V17H3.5V2.5Z\" fill=\"white\"/><\u002Fsvg><\u002Fdiv>\n      <div class=\"logo-wordmark\">\n        <div class=\"logo-top\">LET<span class=\"org\">'S<\u002Fspan><span class=\"div\">RH<\u002Fspan><\u002Fdiv>\n        <div class=\"logo-sub\" style=\"display:flex;align-items:center;gap:6px\">IMPLEMENTAÇÃO 2026 ${dot}<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"hdivider\"><\u002Fdiv>\n    <div class=\"h-stats\">\n      <div class=\"h-stat\"><span class=\"h-stat-n\" style=\"color:#2F75A0\">${all.length}<\u002Fspan><span class=\"h-stat-l\">Entregas<\u002Fspan><\u002Fdiv>\n      <div class=\"h-stat\"><span class=\"h-stat-n\" style=\"color:#45893D\">${done}<\u002Fspan><span class=\"h-stat-l\">Concluídas<\u002Fspan><\u002Fdiv>\n      <div class=\"h-stat\"><span class=\"h-stat-n\" style=\"color:#FF5C35\">${ip}<\u002Fspan><span class=\"h-stat-l\">Em Andamento<\u002Fspan><\u002Fdiv>\n      <div class=\"h-stat\"><span class=\"h-stat-n\" style=\"color:#EF7F0A\">${all.length-done-ip}<\u002Fspan><span class=\"h-stat-l\">Pendentes<\u002Fspan><\u002Fdiv>\n      <div class=\"hdivider\" style=\"height:28px\"><\u002Fdiv>\n      <div class=\"h-stat\"><span class=\"h-stat-n\" style=\"color:#545AD4\">${kDone}<\u002Fspan><span class=\"h-stat-l\">KPIs atingidos<\u002Fspan><\u002Fdiv>\n      <div class=\"h-stat\"><span class=\"h-stat-n\" style=\"color:#90AABF\">${ka.length}<\u002Fspan><span class=\"h-stat-l\">total KPIs<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"flex items-center gap-12\" style=\"flex-shrink:0\">\n      <span id=\"save-indicator\" style=\"display:none;align-items:center;gap:6px;font-size:11px;color:var(--t3)\"><span class=\"save-dot\"><\u002Fspan>Salvando…<\u002Fspan>\n      ${lockBtn}\n      <div class=\"h-right\">\n        <div class=\"h-pct\"><div class=\"h-pct-label\">ENTREGAS<\u002Fdiv><div class=\"h-pct-num\">${pct}%<\u002Fdiv><\u002Fdiv>\n        <div style=\"width:90px\">${pbar(pct,'var(--orange)',7)}<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fheader>`;\n}\n\n// ──────── NAV ────────\nfunction renderNav(){\n  const tabs=[['dashboard','Visão Geral'],['tasks','Tarefas'],['indicadores','Indicadores'],['details','Detalhes'],['timeline','Linha do Tempo']];\n  return`<nav class=\"nav\">${tabs.map(([id,lbl])=>`<button class=\"tab-btn${S.tab===id?' active':''}\" data-action=\"tab\" data-id=\"${id}\">${lbl}<\u002Fbutton>`).join('')}<\u002Fnav>`;\n}\n\n// ──────── DASHBOARD ────────\nfunction renderDashboard(){\n  const all=allItems(),done=all.filter(i=>getSt(i.id)==='done').length,ip=all.filter(i=>getSt(i.id)==='in_progress').length,pct=Math.round(done/all.length*100);\n  const ka=allKpis(),kDone=ka.filter(k=>isKpiOk(k)).length,kPct=Math.round(kDone/ka.length*100);\n  const upcoming=all.filter(i=>getSt(i.id)!=='done').sort((a,b)=>a.ws-b.ws).slice(0,5);\n  const statCards=[\n    ['Entregas',all.length,'#2F75A0','micro-entregas mapeadas'],\n    ['Concluídas',done,'#45893D',pct+'% do total'],\n    ['Em Andamento',ip,'#FF5C35','em execução agora'],\n    ['KPIs Atingidos',kDone,'#545AD4',kPct+'% dos '+ka.length+' indicadores']\n  ].map(([l,v,c,s])=>`<div class=\"card stat-card\" style=\"border-top-color:${c}\"><div class=\"text-xs font-7 text-muted mb-6\" style=\"letter-spacing:.06em;text-transform:uppercase\">${l}<\u002Fdiv><div style=\"font-size:34px;font-weight:800;color:${c};line-height:1;margin-bottom:4px\">${v}<\u002Fdiv><div class=\"text-xs text-muted\">${s}<\u002Fdiv><\u002Fdiv>`).join('');\n  const qCards=QUARTERS.map(q=>{\n    const qi=q.phases.flatMap(p=>p.items),qd=qi.filter(i=>getSt(i.id)==='done').length,qip=qi.filter(i=>getSt(i.id)==='in_progress').length,qpct=Math.round(qd/qi.length*100);\n    const qk=q.phases.flatMap(p=>p.kpis),qkd=qk.filter(k=>isKpiOk(k)).length;\n    return`<div class=\"card p-20\" style=\"border-left:4px solid ${q.color}\"><div class=\"flex justify-between items-start mb-12\"><div>${chip(q.label,q.color)}<div class=\"text-sm font-6 mt-6 lh-14\" style=\"max-width:240px\">${esc(q.name)}<\u002Fdiv><div class=\"text-xs text-muted mt-3\">${esc(q.period)}<\u002Fdiv><\u002Fdiv><div style=\"text-align:right;flex-shrink:0\"><div style=\"font-size:28px;font-weight:800;color:${q.color};line-height:1\">${qpct}%<\u002Fdiv><div class=\"text-xs text-muted mt-2\">${qd}/${qi.length} entregas<\u002Fdiv><div class=\"text-xs text-muted\" style=\"color:${q.color+'BB'}\">${qkd}/${qk.length} KPIs<\u002Fdiv><\u002Fdiv><\u002Fdiv>${pbar(qpct,q.color,5)}<div class=\"flex gap-14 mt-8 flex-wrap\">${qip>0?`<span class=\"text-xs\" style=\"color:${q.color};font-weight:500\">● ${qip} em andamento<\u002Fspan>`:''}&nbsp;${qi.length-qd-qip>0?`<span class=\"text-xs text-muted\">● ${qi.length-qd-qip} pendente(s)<\u002Fspan>`:''}<\u002Fdiv><\u002Fdiv>`;\n  }).join('');\n  const upRows=upcoming.map((item,i)=>{\n    const qd=QUARTERS.find(q=>q.phases.some(p=>p.items.includes(item)));\n    const s=ST_CFG[getSt(item.id)];\n    return`<div class=\"flex items-center gap-12\" style=\"padding:12px 20px;${i<upcoming.length-1?'border-bottom:1px solid #EAF0F6':''}\">${chip(qd.label,qd.color,qd.color+'12',qd.color+'35')}<span class=\"text-sm flex-1 nowrap\" style=\"overflow:hidden;text-overflow:ellipsis;color:var(--t2)\">${esc(item.name)}<\u002Fspan><span class=\"text-xs text-muted nowrap\">${item.wr}<\u002Fspan><span class=\"chip text-xs\" style=\"color:${s.color};background:${s.bg};border-color:${s.ring};font-weight:600\">${s.label}<\u002Fspan><\u002Fdiv>`;\n  }).join('');\n  return`<div class=\"flex-col gap-24\"><div class=\"grid-4\">${statCards}<\u002Fdiv><div class=\"card p-22\"><div class=\"flex justify-between items-center mb-14\"><div><div class=\"text-sm font-7\">Progresso Geral — Implementação RH 2026<\u002Fdiv><div class=\"text-xs text-muted mt-3\">Semanas 1–28 · Junho a Dezembro de 2026<\u002Fdiv><\u002Fdiv><div style=\"font-size:36px;font-weight:800;color:var(--orange)\">${pct}<span style=\"font-size:15px;color:var(--t4)\">%<\u002Fspan><\u002Fdiv><\u002Fdiv>${pbar(pct,'var(--orange)',10)}<div class=\"flex gap-20 mt-10 flex-wrap\">${[['#45893D','Concluído',done],['#FF5C35','Em Andamento',ip],['#EF7F0A','Pendente',all.length-done-ip]].map(([c,l,v])=>`<div class=\"flex items-center gap-6\"><span style=\"width:7px;height:7px;border-radius:50%;background:${c};flex-shrink:0;display:inline-block\"><\u002Fspan><span class=\"text-xs text-muted\">${l}: <strong style=\"color:var(--t1)\">${v}<\u002Fstrong><\u002Fspan><\u002Fdiv>`).join('')}<\u002Fdiv><\u002Fdiv><div><div class=\"section-label\">Progresso por Trimestre<\u002Fdiv><div class=\"grid-2\">${qCards}<\u002Fdiv><\u002Fdiv>${upcoming.length>0?`<div><div class=\"section-label\">Próximas Entregas<\u002Fdiv><div class=\"card ovh\">${upRows}<\u002Fdiv><\u002Fdiv>`:''}<\u002Fdiv>`;\n}\n\n// ──────── TASKS ────────\nfunction renderTasks(){\n  const f=S.filters;\n  const filtered=QUARTERS.filter(q=>f.q==='all'||q.id===f.q).map(q=>({...q,phases:q.phases.map(p=>({...p,items:p.items.filter(i=>{\n    if(f.st!=='all'&&getSt(i.id)!==f.st)return false;\n    if(f.search&&!i.name.toLowerCase().includes(f.search.toLowerCase()))return false;\n    return true;\n  })})).filter(p=>p.items.length>0)})).filter(q=>q.phases.length>0);\n  const count=filtered.reduce((s,q)=>s+q.phases.reduce((ss,p)=>ss+p.items.length,0),0);\n  const qOpts=QUARTERS.map(q=>`<option value=\"${q.id}\"${f.q===q.id?' selected':''}>${q.label} — ${esc(q.name)}<\u002Foption>`).join('');\n  const stOpts=Object.entries(ST_CFG).map(([k,v])=>`<option value=\"${k}\"${f.st===k?' selected':''}>${v.label}<\u002Foption>`).join('');\n  const IS='background:#FFF;border:1px solid var(--border);border-radius:8px;color:var(--t2);font-size:12px;padding:8px 12px;font-family:var(--font);outline:none';\n  const sections=filtered.map(q=>{\n    const phases=q.phases.map(p=>{\n      const isOpen=S.openPhases[p.id]!==false;\n      const done=p.items.filter(i=>getSt(i.id)==='done').length,pct=Math.round(done/p.items.length*100);\n      const rows=p.items.map(item=>{\n        const st=getSt(item.id),dt=getDate(item.id),s=ST_CFG[st],isExp=S.openTasks[item.id];\n        return`<div class=\"task-row${st==='done'?' is-done':''}\" id=\"row-${item.id}\"><div class=\"task-content\"><span class=\"chip\" style=\"color:${q.color};background:${q.color}12;border-color:${q.color}35;font-size:10px;font-weight:700;flex-shrink:0\">${item.id}<\u002Fspan><span class=\"text-sm flex-1 pointer\" style=\"min-width:160px;color:${st==='done'?'var(--t4)':'var(--t1)'};${st==='done'?'text-decoration:line-through':''};line-height:1.4\" data-action=\"toggle-task\" data-id=\"${item.id}\">${esc(item.name)}<\u002Fspan><span class=\"text-xs nowrap\" style=\"background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:3px 9px;color:var(--t3);flex-shrink:0\">${item.wr} · ${item.period}<\u002Fspan>${statusBtn(item.id,st)}<input type=\"date\" class=\"date-input${dt?' has-date':''}\" value=\"${dt}\" data-action=\"set-date\" data-id=\"${item.id}\" title=\"Data de conclusão\" style=\"${dt?'color:#BD0E21;border-color:#FEA081':''}\"/><\u002Fdiv><div class=\"task-desc-box${isExp?' open':''}\"><div style=\"font-size:12px;color:var(--t2);line-height:1.7;background:var(--surface2);border-radius:8px;padding:10px 14px;border:1px solid var(--border)\">${esc(item.desc)}<\u002Fdiv><\u002Fdiv><\u002Fdiv>`;\n      }).join('');\n      return`<div class=\"card ovh mb-10\"><div class=\"acc-header${isOpen?' open':''}\" data-action=\"toggle-phase\" data-id=\"${p.id}\"><span style=\"width:28px;height:28px;border-radius:8px;background:${q.color}15;border:1px solid ${q.color}40;color:${q.color};font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0\">${p.num}<\u002Fspan><span class=\"text-base font-6 flex-1\">${esc(p.name)}<\u002Fspan><span class=\"text-xs text-muted\">${done}/${p.items.length}<\u002Fspan><div style=\"width:68px\">${pbar(pct,q.color,4)}<\u002Fdiv><span class=\"acc-arrow\">›<\u002Fspan><\u002Fdiv><div class=\"acc-body${isOpen?' open':''}\">${rows}<\u002Fdiv><\u002Fdiv>`;\n    }).join('');\n    return`<div class=\"mb-10\"><div class=\"flex items-center gap-10 mb-10\">${chip(q.label,q.color,q.color+'12',q.color+'40')}<span class=\"text-sm font-6 text-2\">${esc(q.name)}<\u002Fspan><span class=\"text-xs text-muted\">· ${esc(q.period)}<\u002Fspan><\u002Fdiv>${phases}<\u002Fdiv>`;\n  }).join('');\n  return`<div><div class=\"filter-row\"><input type=\"text\" class=\"finput\" placeholder=\"🔍  Buscar entregável...\" value=\"${esc(f.search)}\" data-action=\"search\" id=\"search-input\" style=\"flex:1 1 200px;min-width:180px\"/><select class=\"finput\" data-action=\"filter-q\" style=\"${IS}\"><option value=\"all\"${f.q==='all'?' selected':''}>Todos os trimestres<\u002Foption>${qOpts}<\u002Fselect><select class=\"finput\" data-action=\"filter-st\" style=\"${IS}\"><option value=\"all\"${f.st==='all'?' selected':''}>Todos os status<\u002Foption>${stOpts}<\u002Fselect><span class=\"text-xs text-muted nowrap\">${count} entrega${count!==1?'s':''}<\u002Fspan><\u002Fdiv><div class=\"hint-box\">💡 Clique no nome para ver a descrição · Clique no badge de status para alterar · Preencha a data ao concluir<\u002Fdiv>${sections||'<div style=\"text-align:center;color:var(--t4);padding:60px 20px\">Nenhum resultado encontrado.<\u002Fdiv>'}<\u002Fdiv>`;\n}\n\n// ──────── INDICADORES ────────\nfunction renderIndicadores(){\n  const fq=S.filters.kpiQ||'all';\n  const IS='background:#FFF;border:1px solid var(--border);border-radius:8px;color:var(--t2);font-size:12px;padding:8px 12px;font-family:var(--font);outline:none';\n  const qOpts=QUARTERS.map(q=>`<option value=\"${q.id}\"${fq===q.id?' selected':''}>${q.label} — ${esc(q.name)}<\u002Foption>`).join('');\n  const ka=allKpis(),kDone=ka.filter(k=>isKpiOk(k)).length,kIp=ka.filter(k=>k.type==='percent'&&getKpiVal(k.id)>0&&!isKpiOk(k)).length,kPend=ka.length-kDone-kIp,kPct=Math.round(kDone/ka.length*100);\n  const statCards=[['Total de KPIs',ka.length,'#2F75A0','indicadores mapeados'],['Atingidos',kDone,'#45893D',kPct+'% do total'],['Em Progresso',kIp,'#FF5C35','parcialmente alcançados'],['Pendentes',kPend,'#EF7F0A','aguardando registro']].map(([l,v,c,s])=>`<div class=\"card stat-card\" style=\"border-top-color:${c}\"><div class=\"text-xs font-7 text-muted mb-6\" style=\"letter-spacing:.06em;text-transform:uppercase\">${l}<\u002Fdiv><div style=\"font-size:34px;font-weight:800;color:${c};line-height:1;margin-bottom:4px\">${v}<\u002Fdiv><div class=\"text-xs text-muted\">${s}<\u002Fdiv><\u002Fdiv>`).join('');\n  const qSummary=QUARTERS.map(q=>{const qk=q.phases.flatMap(p=>p.kpis),qkd=qk.filter(k=>isKpiOk(k)).length,qpct=Math.round(qkd/qk.length*100);return`<div class=\"card p-20\" style=\"border-left:3px solid ${q.color}\"><div class=\"flex justify-between items-center mb-10\"><div>${chip(q.label,q.color,q.color+'12',q.color+'40')}<div class=\"text-xs text-muted mt-4\">${qkd}/${qk.length} atingidos<\u002Fdiv><\u002Fdiv><div style=\"font-size:24px;font-weight:800;color:${q.color}\">${qpct}%<\u002Fdiv><\u002Fdiv>${pbar(qpct,q.color,5)}<\u002Fdiv>`;\n  }).join('');\n  const phaseSections=QUARTERS.filter(q=>fq==='all'||q.id===fq).map(q=>q.phases.map(p=>{\n    const achieved=p.kpis.filter(k=>isKpiOk(k)).length,pct=Math.round(achieved/p.kpis.length*100);\n    const rows=p.kpis.map(kpi=>{\n      const ok=isKpiOk(kpi);\n      if(kpi.type==='percent'){\n        const val=getKpiVal(kpi.id),tgt=kpi.target,barPct=tgt?Math.min(val/tgt*100,100):val;\n        const sc=ok?'#45893D':val>0?'#FF5C35':'#EF7F0A',sb=ok?'#ECF3EC':val>0?'#FDE1D8':'#FEF6E1',sr=ok?'#AED7AC':val>0?'#FEA081':'#FFD189',sl=ok?'✓ Atingido':val>0?'◐ Em andamento':'○ Pendente';\n        return`<div class=\"kpi-row${ok?' kpi-ok':''}\"><span class=\"kpi-text${ok?' done-text':''}\">${esc(kpi.text)}<\u002Fspan><div class=\"kpi-num-wrap\"><input type=\"number\" min=\"0\" max=\"100\" class=\"kpi-input\" value=\"${val}\" data-action=\"kpi-num\" data-id=\"${kpi.id}\" placeholder=\"0\"/><span class=\"kpi-meta\">% ${tgt?'/ Meta: '+tgt+'%':''}<\u002Fspan><div class=\"kpi-bar-wrap\">${pbar(barPct,ok?'#45893D':q.color,5,'#EAF0F6')}<\u002Fdiv><\u002Fdiv><span class=\"kpi-status-chip\" style=\"color:${sc};background:${sb};border-color:${sr}\">${sl}<\u002Fspan><\u002Fdiv>`;\n      }else{\n        return`<div class=\"kpi-row${ok?' kpi-ok':''}\"><span class=\"kpi-text${ok?' done-text':''}\">${esc(kpi.text)}<\u002Fspan><button class=\"kpi-toggle${ok?' achieved':' pending'}\" data-action=\"kpi-bin\" data-id=\"${kpi.id}\">${ok?'✓ Concluído':'○ Pendente'}<\u002Fbutton><\u002Fdiv>`;\n      }\n    }).join('');\n    return`<div class=\"card ovh mb-10\"><div class=\"acc-header open\"><span style=\"width:28px;height:28px;border-radius:8px;background:${q.color}15;border:1px solid ${q.color}40;color:${q.color};font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0\">${p.num}<\u002Fspan><span class=\"text-base font-6 flex-1\">${esc(p.name)}<\u002Fspan>${chip(q.label,q.color,q.color+'12',q.color+'35')}<span class=\"text-xs text-muted\">${achieved}/${p.kpis.length} atingidos<\u002Fspan><div style=\"width:68px\">${pbar(pct,q.color,4)}<\u002Fdiv><\u002Fdiv><div>${rows}<\u002Fdiv><\u002Fdiv>`;\n  }).join('')).join('');\n  return`<div class=\"flex-col gap-24\"><div class=\"grid-4\">${statCards}<\u002Fdiv><div class=\"card p-22\"><div class=\"flex justify-between items-center mb-14\"><div><div class=\"text-sm font-7\">Progresso dos Indicadores de Sucesso<\u002Fdiv><div class=\"text-xs text-muted mt-3\">${kDone} de ${ka.length} KPIs atingidos<\u002Fdiv><\u002Fdiv><div style=\"font-size:36px;font-weight:800;color:#545AD4\">${kPct}<span style=\"font-size:15px;color:var(--t4)\">%<\u002Fspan><\u002Fdiv><\u002Fdiv>${pbar(kPct,'#545AD4',10)}<\u002Fdiv><div><div class=\"section-label\">KPIs por Trimestre<\u002Fdiv><div class=\"grid-2\">${qSummary}<\u002Fdiv><\u002Fdiv><div><div class=\"flex items-center gap-14 mb-14 flex-wrap\"><div class=\"section-label\" style=\"margin-bottom:0\">Registro por Fase<\u002Fdiv><select class=\"finput\" data-action=\"filter-kq\" style=\"${IS}\"><option value=\"all\"${fq==='all'?' selected':''}>Todos os trimestres<\u002Foption>${qOpts}<\u002Fselect><span class=\"hint-box\" style=\"margin-bottom:0;flex:1\">💡 Para KPIs numéricos, insira o valor atual em %. Para KPIs binários, clique para marcar como concluído.<\u002Fspan><\u002Fdiv>${phaseSections}<\u002Fdiv><\u002Fdiv>`;\n}\n\n// ──────── DETAILS ────────\nfunction renderDetails(){\n  const fq=S.filters.detailQ||'all';\n  const qOpts=QUARTERS.map(q=>`<option value=\"${q.id}\"${fq===q.id?' selected':''}>${q.label} — ${esc(q.name)}<\u002Foption>`).join('');\n  const sections=QUARTERS.filter(q=>fq==='all'||q.id===fq).map(q=>{\n    const phases=q.phases.map(p=>{\n      const isOpen=S.openDetails[p.id]!==false;\n      const body=!isOpen?'':`<div style=\"padding:20px 24px\"><div class=\"detail-section\"><div class=\"detail-section-title\">🏁 Marcos Finais<\u002Fdiv>${p.marcos.map(m=>`<div class=\"bullet-li\"><span class=\"bullet-dot\" style=\"color:${q.color}\">●<\u002Fspan>${esc(m)}<\u002Fdiv>`).join('')}<\u002Fdiv><div class=\"grid-1-2 mb-20\"><div class=\"info-box\"><div class=\"info-box-title\">👤 Responsável<\u002Fdiv><div class=\"text-sm font-6 text-2\">${esc(p.responsible)}<\u002Fdiv><\u002Fdiv><div class=\"info-box\"><div class=\"info-box-title\">👥 Participantes Chave<\u002Fdiv><div class=\"flex flex-wrap gap-6\">${p.participants.map(x=>`<span style=\"font-size:12px;color:var(--t2);background:#FFF;border:1px solid var(--border);border-radius:20px;padding:2px 10px\">${esc(x)}<\u002Fspan>`).join('')}<\u002Fdiv><\u002Fdiv><\u002Fdiv><div class=\"detail-section\"><div class=\"detail-section-title\">📋 Entregáveis Detalhados<\u002Fdiv>${p.items.map(item=>`<div style=\"background:var(--surface2);border:1px solid var(--border);border-left:3px solid ${q.color};border-radius:10px;padding:14px 16px;margin-bottom:10px\"><div class=\"flex items-center gap-8 mb-10 flex-wrap\">${chip(item.id,q.color,q.color+'12',q.color+'35')}<span class=\"text-sm font-7 flex-1\">${esc(item.name)}<\u002Fspan><span style=\"font-size:11px;color:var(--t3);background:#FFF;border:1px solid var(--border);border-radius:8px;padding:2px 8px;white-space:nowrap;flex-shrink:0\">${item.wr} · ${item.period}<\u002Fspan><\u002Fdiv>${item.bullets.map(b=>`<div class=\"bullet-li\"><span class=\"bullet-dot\" style=\"color:${q.color}\">◆<\u002Fspan>${esc(b)}<\u002Fdiv>`).join('')}<\u002Fdiv>`).join('')}<\u002Fdiv><div class=\"detail-section\"><div class=\"detail-section-title\">📊 Indicadores de Sucesso (KPIs)<\u002Fdiv><div class=\"grid-auto\">${p.kpis.map(k=>`<div class=\"kpi-card-d\"><span class=\"bullet-dot\" style=\"color:#2F75A0;margin-top:3px\">◆<\u002Fspan>${esc(k.text)}${k.type==='percent'&&k.target?` <span style=\"color:var(--orange);font-weight:700\">· Meta: ${k.target}%<\u002Fspan>`:''}<\u002Fdiv>`).join('')}<\u002Fdiv><\u002Fdiv><div class=\"detail-section\"><div class=\"detail-section-title\">🎯 Metas do RH para o Trimestre<\u002Fdiv>${p.goals.map((g,i)=>`<div class=\"goal-item\" style=\"background:${q.color}08;border:1px solid ${q.color}25\"><span style=\"color:${q.color};font-weight:700;font-size:12px;flex-shrink:0\">${i+1}.<\u002Fspan><span style=\"font-size:13px;color:var(--t2);line-height:1.4\">${esc(g)}<\u002Fspan><\u002Fdiv>`).join('')}<\u002Fdiv><\u002Fdiv>`;\n      return`<div class=\"card ovh mb-10\"><div class=\"acc-header${isOpen?' open':''}\" data-action=\"toggle-detail\" data-id=\"${p.id}\"><span style=\"width:30px;height:30px;border-radius:8px;background:${q.color}15;border:1px solid ${q.color}40;color:${q.color};font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0\">${p.num}<\u002Fspan><span class=\"text-lg font-7 flex-1\" style=\"color:var(--t1)\">${esc(p.name)}<\u002Fspan><span class=\"acc-arrow\">›<\u002Fspan><\u002Fdiv>${body}<\u002Fdiv>`;\n    }).join('');\n    return`<div class=\"mb-10\"><div class=\"card p-20 mb-14 flex items-center gap-12\" style=\"border-left:4px solid ${q.color}\">${chip(q.label,q.color,q.color+'12',q.color+'40')}<div><div class=\"text-lg font-7\">${esc(q.name)}<\u002Fdiv><div class=\"text-xs text-muted\">${esc(q.period)}<\u002Fdiv><\u002Fdiv><\u002Fdiv>${phases}<\u002Fdiv>`;\n  }).join('');\n  return`<div><div class=\"filter-row\"><select class=\"finput\" data-action=\"filter-dq\"><option value=\"all\"${fq==='all'?' selected':''}>Todos os trimestres<\u002Foption>${qOpts}<\u002Fselect><span class=\"text-xs text-muted\">Visão completa — todos os campos da planilha<\u002Fspan><\u002Fdiv>${sections}<\u002Fdiv>`;\n}\n\n// ──────── TIMELINE ────────\nfunction renderTimeline(){\n  const W=28;\n  const MONTHS=[{l:'Junho',n:4},{l:'Julho',n:4},{l:'Agosto',n:4},{l:'Setembro',n:4},{l:'Outubro',n:4},{l:'Novembro',n:5},{l:'Dezembro',n:3}];\n  const COL=100/W;\n  const mRow=MONTHS.map(m=>`<div class=\"tl-month-cell\" style=\"width:${m.n*COL}%\">${m.l}<\u002Fdiv>`).join('');\n  const wRow=Array.from({length:W},(_,i)=>`<div class=\"tl-week-cell\" style=\"width:${COL}%\">${i+1}<\u002Fdiv>`).join('');\n  const rows=QUARTERS.map(q=>{\n    const pRows=q.phases.map(p=>{\n      const ph=`<div class=\"tl-row\"><div class=\"tl-label\" style=\"padding-left:12px;font-weight:600;color:var(--t3)\">${p.num}. ${esc(p.name.split(' ').slice(0,4).join(' '))}<\u002Fdiv><div class=\"tl-bar-wrap\"><\u002Fdiv><\u002Fdiv>`;\n      const iRows=p.items.map(item=>{\n        const st=getSt(item.id),sc=ST_CFG[st],L=((item.ws-1)/W)*100,BW=((item.we-item.ws+1)/W)*100;\n        return`<div class=\"tl-row\"><div class=\"tl-label\" style=\"padding-left:24px;${st==='done'?'text-decoration:line-through;color:var(--t4)':''}\"> ${item.id} ${esc(item.name)}<\u002Fdiv><div class=\"tl-bar-wrap\"><div class=\"tl-bar\" title=\"${item.id}: ${esc(item.name)} · ${item.wr} · ${sc.label}\" style=\"left:${L}%;width:${BW}%;background:${st==='done'?sc.dot:q.color};opacity:${st==='done'?0.3:0.7}\"><\u002Fdiv><\u002Fdiv><\u002Fdiv>`;\n      }).join('');\n      return ph+iRows;\n    }).join('');\n    return`<div style=\"margin-bottom:18px\"><div class=\"tl-row mb-6\"><div style=\"width:220px;flex-shrink:0;padding-right:12px\">${chip(q.label+' — '+q.name.split(' ').slice(0,3).join(' ')+'…',q.color,q.color+'10',q.color+'30')}<\u002Fdiv><div style=\"flex:1;height:1px;background:${q.color}20;align-self:center\"><\u002Fdiv><\u002Fdiv>${pRows}<\u002Fdiv>`;\n  }).join('');\n  const leg=Object.entries(ST_CFG).map(([k,v])=>`<div class=\"tl-legend-item\"><span class=\"tl-legend-color\" style=\"background:${v.dot};opacity:${k==='done'?0.3:0.7}\"><\u002Fspan>${v.label}<\u002Fdiv>`).join('');\n  return`<div class=\"timeline-wrap\"><div style=\"min-width:900px\"><div class=\"tl-month-row mb-4\">${mRow}<\u002Fdiv><div class=\"tl-week-row\" style=\"margin-bottom:14px\">${wRow}<\u002Fdiv>${rows}<div class=\"tl-legend\">${leg}<\u002Fdiv><\u002Fdiv><\u002Fdiv>`;\n}\n\n// ──────── RENDER ────────\nfunction render(){\n  const sf=document.activeElement?.id==='search-input';\n  const views={dashboard:renderDashboard,tasks:renderTasks,indicadores:renderIndicadores,details:renderDetails,timeline:renderTimeline};\n  document.getElementById('app').innerHTML=renderHeader()+renderNav()+`<div class=\"content\">${(views[S.tab]||renderDashboard)()}<\u002Fdiv>`;\n  document.body.classList.toggle('locked',!S.editMode);\n  if(sf&&S.tab==='tasks'){const el=document.getElementById('search-input');if(el){el.focus();const v=el.value.length;el.setSelectionRange(v,v);}}\n}\n\n// ──────── EVENTS ────────\ndocument.addEventListener('click', async e=>{\n  const el=e.target.closest('[data-action]');if(!el)return;\n  const{action,id}=el.dataset;\n  if(action==='tab'){S.tab=id;render();return;}\n  if(action==='unlock'){showModal();return;}\n  if(action==='lock'){S.editMode=false;S.editKey='';sessionStorage.removeItem('lets-edit-key');document.body.classList.add('locked');render();return;}\n  if(action==='cycle'){\n    await cycleStatus(id);\n    const row=document.getElementById('row-'+id);\n    if(row){\n      const st=getSt(id),dt=getDate(id),s=ST_CFG[st];\n      row.className='task-row'+(st==='done'?' is-done':'');\n      const btn=row.querySelector('[data-action=\"cycle\"]');\n      if(btn){btn.style.color=s.color;btn.style.background=s.bg;btn.style.borderColor=s.ring;btn.innerHTML=`<span style=\"width:6px;height:6px;border-radius:50%;background:${s.dot};display:inline-block;flex-shrink:0\"><\u002Fspan>&nbsp;${s.label}`;}\n      const dateEl=row.querySelector('.date-input');\n      if(dateEl){dateEl.value=dt;if(dt){dateEl.classList.add('has-date');dateEl.style.color='#BD0E21';dateEl.style.borderColor='#FEA081';}else{dateEl.classList.remove('has-date');dateEl.style.color='';dateEl.style.borderColor='';}}\n      const nameEl=row.querySelector('[data-action=\"toggle-task\"]');\n      if(nameEl){nameEl.style.color=st==='done'?'var(--t4)':'var(--t1)';nameEl.style.textDecoration=st==='done'?'line-through':'none';}\n    }\n    const all=allItems(),done=all.filter(i=>getSt(i.id)==='done').length,ip=all.filter(i=>getSt(i.id)==='in_progress').length,pct=Math.round(done/all.length*100);\n    const nums=document.querySelectorAll('.h-stat-n');\n    if(nums.length>=4){nums[0].textContent=all.length;nums[1].textContent=done;nums[2].textContent=ip;nums[3].textContent=all.length-done-ip;}\n    const pn=document.querySelector('.h-pct-num');if(pn)pn.textContent=pct+'%';\n    const pf=document.querySelector('.header .pbar-fill');if(pf)pf.style.width=pct+'%';\n    return;\n  }\n  if(action==='toggle-task'){S.openTasks[id]=!S.openTasks[id];const d=document.querySelector(`#row-${id} .task-desc-box`);if(d)d.classList.toggle('open');return;}\n  if(action==='toggle-phase'){S.openPhases[id]=S.openPhases[id]===false?true:false;const h=el.closest('.acc-header'),b=h?.nextElementSibling;if(h&&b){h.classList.toggle('open');b.classList.toggle('open');}return;}\n  if(action==='toggle-detail'){S.openDetails[id]=S.openDetails[id]===false?true:false;render();return;}\n  if(action==='kpi-bin'){\n    if(!S.editMode){showModal();return;}\n    const cur=getKpiAchieved(id);\n    S.kpiVals[id]={...(S.kpiVals[id]||{}),achieved:!cur};\n    await apiCall({action:'updateKpi',id,value:getKpiVal(id),achieved:String(!cur)});\n    render();return;\n  }\n});\n\ndocument.addEventListener('change', async e=>{\n  const el=e.target.closest('[data-action]');if(!el)return;\n  const{action,id}=el.dataset;\n  if(action==='set-date'){await setDateFn(id,el.value);if(el.value){el.classList.add('has-date');el.style.color='#BD0E21';el.style.borderColor='#FEA081';}else{el.classList.remove('has-date');el.style.color='';el.style.borderColor='';}return;}\n  if(action==='filter-q'){S.filters.q=el.value;render();return;}\n  if(action==='filter-st'){S.filters.st=el.value;render();return;}\n  if(action==='filter-dq'){S.filters.detailQ=el.value;render();return;}\n  if(action==='filter-kq'){S.filters.kpiQ=el.value;render();return;}\n  if(action==='kpi-num'){\n    if(!S.editMode)return;\n    const val=Math.max(0,Math.min(100,Number(el.value)||0));\n    S.kpiVals[id]={...(S.kpiVals[id]||{}),value:val};\n    await apiCall({action:'updateKpi',id,value:val,achieved:String(getKpiAchieved(id))});\n    render();return;\n  }\n});\n\ndocument.addEventListener('input',e=>{\n  if(e.target.id==='search-input'){S.filters.search=e.target.value;render();}\n});\n\n// ──────── MODAL ────────\nfunction showModal(){\n  const m=document.getElementById('edit-modal');\n  if(m){m.style.display='flex';document.getElementById('modal-pass').value='';document.getElementById('modal-error').style.display='none';document.getElementById('modal-pass').focus();}\n}\nfunction hideModal(){const m=document.getElementById('edit-modal');if(m)m.style.display='none';}\n\nasync function confirmLogin(){\n  const pass=document.getElementById('modal-pass').value.trim();\n  if(!pass)return;\n  const errEl=document.getElementById('modal-error');\n  errEl.style.display='none';\n  if(API_URL){\n    try{\n      const d=await jsonp(API_URL+'?'+new URLSearchParams({action:'verify',password:pass}).toString());\n      if(!d.ok){errEl.style.display='block';return;}\n    }catch(e){console.warn('Verificação offline.');}\n  }\n  S.editMode=true;S.editKey=pass;\n  sessionStorage.setItem('lets-edit-key',pass);\n  document.body.classList.remove('locked');\n  hideModal();render();\n}\n\ndocument.getElementById('modal-confirm').addEventListener('click',confirmLogin);\ndocument.getElementById('modal-cancel').addEventListener('click',hideModal);\ndocument.getElementById('modal-pass').addEventListener('keydown',e=>{if(e.key==='Enter')confirmLogin();});\ndocument.getElementById('edit-modal').addEventListener('click',e=>{if(e.target===e.currentTarget)hideModal();});\n\n// ──────── INIT ────────\ndocument.body.classList.add('locked');\nrender();\nloadData();\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
</body>
</html>
